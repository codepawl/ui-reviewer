<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Get UXRay MCP Access</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-body">
    <div class="ambient" aria-hidden="true"><span></span><span></span><span></span></div>
    <header class="nav"><a class="brand" href="/"><span class="mark"></span><span>UXRay</span></a><nav><a href="/docs.html">Docs</a><a href="/demo-report.html">Proof</a><a href="https://github.com/codepawl/uxray" target="_blank" rel="noreferrer">GitHub</a><a class="nav-cta" href="/checkout.html?plan=pro">Pay</a></nav></header>
    <main class="auth-main shell">
      <section class="auth-card reveal">
        <div>
          <h1>Get MCP access.</h1>
          <p class="lede">Create an email-scoped UXRay workspace, start a Creem checkout, and unlock dashboard credits/report history.</p>
        </div>
        <form class="auth-form" action="/v1/auth/register" method="post">
          <label>Email<input type="email" name="email" placeholder="you@company.com" required /></label>
          <label>Use case<select name="use_case"><option>AI-generated landing pages</option><option>Agent-built dashboards</option><option>Frontend QA in CI</option><option>Team UI review workflow</option></select></label>
          <label>Plan<select name="plan"><option value="pro">Pro hosted reviews</option><option value="team">Team / CI</option><option value="credits">Review credit pack</option></select></label>
          <input type="hidden" name="intent" value="checkout" />
          <button class="button primary" type="submit">Proceed to payment</button>
          <p class="fine-print">This creates the workspace/session first, records a pending entitlement, then redirects to Creem checkout.</p>
        </form>
      </section>
    </main>
  </body>
</html>
